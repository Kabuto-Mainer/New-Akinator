    step {
        text: "Но потом ты начинаешь понимать, что происходит. $Даже промты перестал писать."
    }
    step {
        text: "Матан не стал любимым,$но хотя бы перестал выглядеть проклятием."
        img: "Data/Img/matan.png"
    }
