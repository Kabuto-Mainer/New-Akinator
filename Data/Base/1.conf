start {
    step {
        text: "8:30 утра.$Будильник орёт так, что даже беруши не помогают"
    }
    step {
        text: "Ты открываешь глаза, видишь, что сосед еще спит,$и думаешь 'Стоит поваляться еще минут 5'?"
    }
    choice {
        text: "Встать"
        go: "1_awake"
    }
    choice {
        text: "Забить и спать дальше"
        go: "1_sleep"
    }
}

1_sleep {
    step {
        text: "Ты выключаешь будильник$и почти сразу проваливаешься обратно в сон."
    }
    step {
        text: "Следующее пробуждение уже нервное, ведь на часах уже 11:03$Ты резко садишься и лезешь в чат группы."
    }
    step {
        text: "'Народ, отмечали на лекции?'$А сам в это время уже думаешь,$что схалявить на экзамене уже не выйдет."
    }
    step {
        text: "Ответ приходит не сразу.$За это время ты уже думаешь начать смотреть записанные лекции."
    }
    step {
        text: "'Не, сегодня не отмечали.'$Ты выдыхаешь. Можно немного расслабиться."
    }
    next: "2_free_time"
}

1_awake {
    step {
        text: "Ты садишься на край кровати.$Организм против, но формально главное сражение уже выиграно."
    }
    step {
        text: "Глаза ещё не открылись до конца,$а жизнь уже требует осмысленных действий."
    }
    choice {
        text: "Выпить кофе"
        go: "2_coffee_yes"
    }
    choice {
        text: "Не пить кофе"
        go: "2_coffee_no"
    }
}

2_coffee_yes {
    step {
        text: "Кофе крепкий, горячий и злой.$Именно такой сейчас и нужен."
        img: "Data/Img/cofee.png"
    }
    step {
        text: "С каждым глотком мир становится терпимее,$а мозг начинает подавать сигналы жизни."
    }
    step {
        text: "На лекцию ты приходишь почти человеком."
    }
    next: "3_lecture_work"
}

2_coffee_no {
    step {
        text: "Ты решаешь обойтись без кофе.$Тело считает это сомнительным решением."
        img: "Data/Img/not_cofee.png"
    }
    step {
        text: "Холодный воздух немного бодрит,$но идти не долго, и в корпус ты приходишь еще сонным."
    }
    next: "3_lecture_sleep"
}

3_lecture_sleep {
    step {
        text: "Лекция начинается.$Преподаватель объясняет материал, расписывает уже$четвертую доску, но тебя волнует другое."
        img: "Data/Img/lect.png"
    }
    step {
        text: "Ты пытаешься держаться,$но голос преподавателя звучит всё больше как колыбельная."
    }
    step {
        text: "В какой-то момент уже трудно понять,$слушаешь ты или просто спишь с открытыми глазами."
    }
    next: "3_attendance"
}

3_lecture_work {
    step {
        text: "Ты смотришь на доску, на конспекты и понимаешь,$что успел и записать, и понять происходящие."
        img: "Data/Img/lect.png"
    }
    step {
        text: "Даже разобрать, что написано на доске для тебя не проблема."
    }
    step {
        text: "На секунду тебе даже кажется,$что ты пришёл сюда не зря."
    }
    next: "3_attendance"
}

3_attendance {
    step {
        text: "Под конец пары преподаватель начинает отмечать присутствующих."
        img: "Data/Img/notes.png"
    }
    step {
        text: "И тут ты вспоминаешь,$что твой друг проспал, а по списку вы идёте подряд."
    }
    step {
        text: "С одной стороны — дружба.$С другой — преподаватель явно не дурак."
    }
    choice {
        text: "Отметиться за друга"
        go: "4_mark_friend"
    }
    choice {
        text: "Не отмечать"
        go: "4_not_mark_friend"
    }
}

4_mark_friend {
    step {
        text: "Когда называют фамилию друга, ты отвечаешь почти без паузы.$Слишком уверенно, чтобы это выглядело естественно."
        img: "Data/Img/here.png"
    }
    step {
        text: "Преподаватель задерживает на тебе взгляд,$но ничего не говорит."
        img: "Data/Img/view.png"
    }
    step {
        text: "После пары друг пишет:$'Ну что, спас меня?'"
        img: "Data/Img/call.png"
    }
    step {
        text: "Ты отвечаешь: 'Да, всё нормально.'$В ответ прилетает уважение."
    }
    step {
        text: "Немного риска,$немного адреналина и плюс к дружеской репутации."
    }
    next: "2_free_time"
}

4_not_mark_friend {
    step {
        text: "Когда называют фамилию друга, ты молчишь.$Преподаватель спокойно идёт дальше."
    }
    step {
        text: "Формально всё честно.$Неформально ты уже ждёшь сообщение."
    }
    step {
        text: "Телефон вибрирует.$Друг пишет: 'Ты меня отметил?'"
        img: "Data/Img/call.png"
    }
    choice {
        text: "Соврать"
        go: "4_lie"
    }
    choice {
        text: "Отмазаться"
        go: "4_excuse"
    }
    choice {
        text: "Сказать правду"
        go: "4_truth"
    }
}

4_lie {
    step {
        text: "Ты пишешь: 'Да, конечно.'$Сообщение уверенное, а внутри уже неприятно."
    }
    step {
        text: "Позже друг узнаёт правду.$В чате становится ощутимо холоднее."
    }
    step {
        text: "Скандала нет,$но осадок остаётся."
    }
    next: "2_free_time"
}

4_excuse {
    step {
        text: "Ты отвечаешь: 'Там слишком палевно было.$Мы прям подряд шли.'"
    }
    step {
        text: "Друг отвечает: 'Ладно, понял.'$Без восторга, но и без драмы."
    }
    next: "2_free_time"
}

4_truth {
    step {
        text: "Ты отвечаешь прямо: 'Не стал.$Слишком заметно было.'"
    }
    step {
        text: "Пауза тянется дольше, чем хотелось бы."
    }
    step {
        text: "Потом приходит: 'Да норм, сам виноват, что проспал.'"
    }
    step {
        text: "Становится легче.$Честность не радует, зато потом ничего не надо разгребать."
    }
    next: "2_free_time"
}

2_free_time {
    step {
        text: "После первой половины дня у тебя наконец появляется свободное время."
        img: "Data/Img/free_time.png"
    }
