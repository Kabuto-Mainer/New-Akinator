        text: "Делать домашку"
        go: "5_homework"
    }
    choice {
        text: "Попрогать"
        go: "5_coding"
    }
    choice {
        text: "Погамать"
        go: "5_gaming"
    }
    choice {
        text: "Пойти на физру"
        go: "5_sport"
    }
